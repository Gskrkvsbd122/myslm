<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transformer PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body>
    <div class="app-container">
        <header>
            <img src="icon.svg" alt="Logo" class="logo">
            <h1>Nano-Transformer</h1>
        </header>
        
        <div id="chat-box" class="chat-box">
            <div class="message system">Model initialized with random weights. Ready for inference!</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a prompt..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="transformer.js"></script>
    <script src="app.js"></script>
</body>
</html>
